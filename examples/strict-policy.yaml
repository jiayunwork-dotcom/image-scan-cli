policy_name: "strict-policy"
version: "1.0"
description: "Strict admission policy for production container images"
fail_action: block

rules:
  - id: "max-critical-vulns"
    name: "Maximum Critical Vulnerabilities"
    severity: error
    condition:
      type: vuln_severity_threshold
      max_critical: 0
      max_high: 3
      max_medium: 20

  - id: "vuln-age-limit"
    name: "Vulnerability Age Limit"
    severity: error
    condition:
      type: vuln_age_limit
      max_days_since_publish: 90

  - id: "forbidden-packages"
    name: "Forbidden Packages"
    severity: error
    condition:
      type: package_blacklist
      packages:
        - "telnet*"
        - "ftp"
        - "rsh"
        - "nis"

  - id: "pinned-versions"
    name: "Pinned Package Versions"
    severity: warning
    condition:
      type: package_version_pin
      pins:
        - name: "openssl"
          allowed_versions: ">=1.1.1,<4.0.0"
        - name: "libxml2"
          allowed_versions: ">=2.9.12,<3.0.0"
        - name: "curl"
          allowed_versions: ">=7.80.0,<9.0.0"

  - id: "license-whitelist"
    name: "Allowed Licenses Only"
    severity: warning
    condition:
      type: license_whitelist
      allowed_licenses:
        - "MIT"
        - "Apache-2.0"
        - "BSD-2-Clause"
        - "BSD-3-Clause"
        - "ISC"
        - "Zlib"
        - "CC0-1.0"
        - "MPL-2.0"

  - id: "max-total-vulns"
    name: "Maximum Total Vulnerabilities"
    severity: error
    condition:
      type: max_total_vulns
      limit: 50

  - id: "required-security-packages"
    name: "Required Security Packages"
    severity: error
    condition:
      type: required_packages
      packages:
        - "openssl"
        - "ca-certificates"

  - id: "layer-count-limit"
    name: "Layer Count Limit"
    severity: info
    condition:
      type: layer_count_limit
      max_layers: 30
